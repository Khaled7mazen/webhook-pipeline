name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: webhook_pipeline
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d webhook_pipeline"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/webhook_pipeline
      WORKER_POLL_INTERVAL_MS: 3000
      WORKER_ID: ci-worker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Run migrations
        run: npm run db:push

      - name: Build Docker image
        run: docker build -t webhook-pipeline .